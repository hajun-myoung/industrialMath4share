<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>0409: Signin page</title>
    <link rel="stylesheet" href="css/global.css" />
    <script type="module" src="./js/pages/signin.js"></script>
  </head>
  <body class="centralize">
    <div id="wrapper">
      <div class="card-title centralize bold-text">로그인</div>
      <div id="formWrapper">
        <form action="">
          <div class="formSection">
            <label for="id">이메일</label>
            <input type="text" id="input-id" name="id" placeholder="your@email.com" />
          </div>
          <div class="formSection">
            <label for="pw">비밀번호</label>
            <input type="password" id="input-pw" placeholder="비밀번호를 입력하세요" name="pw" />
          </div>
          <div class="formSection">
            <button id="signin" type="submit" class="blue-purple-gradient">로그인</button>
            <div class="error-box"></div>
          </div>
        </form>
      </div>
    </div>
    <div id="version">version 1.0.0 / All Rights Reserved @hajun</div>
  </body>
</html>

info:
  name: Create a menu
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/menus
  body:
    type: json
    data: |-
      {
        "name": {
          "kor":"에스메랄다 푼다도르 게샤",
          "eng":"Esmeralda Fundador Geisha Natural",
          "esp":"Geisha Natural Esmeralda Fundador"
        },
        "price": 18000,
        "category": "Brewing Coffee"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

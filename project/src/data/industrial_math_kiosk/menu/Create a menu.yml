info:
  name: Create a menu
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/menus
  body:
    type: json
    data: |-
      {
        "name": {
          "kor": "히비스커스티",
          "eng": "Hibiscus Tea",
          "esp": "Té de hibisco"
        },
        "price": 5000,
        "category": "tea"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

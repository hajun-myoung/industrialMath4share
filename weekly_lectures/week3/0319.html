<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM</title>
  </head>
  <body>
    <script>
      const newDiv = document.createElement('div');
      newDiv.innerHTML = 'Hello, Script Handled!';
      document.body.appendChild(newDiv);
      newDiv.innerText = '<h1>hi</h1>';
    </script>
  </body>
</html>
